<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen OCR - Pemindai Kutukan Teks</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <style>
        :root {
            --jujutsu-red: #ff3333;
            --jujutsu-blue: #00f3ff;
            --glass-bg: rgba(7, 10, 20, 0.9); 
            --glass-border: rgba(255, 51, 51, 0.25); 
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #f3f4f6; background-color: #02040a; overflow-x: hidden; }

        /* Latar Belakang */
        .video-bg { position: fixed; top: 50%; left: 50%; width: 100%; height: 100%; z-index: -1; transform: translate(-50%, -50%); object-fit: cover; pointer-events: none; filter: grayscale(20%); }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: rgba(2, 4, 10, 0.7); }

        .container { max-width: 650px; width: 100%; background: var(--glass-bg); border: 2px solid var(--glass-border); border-radius: 24px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        h1 { font-family: 'Impact', sans-serif; font-size: 3rem; text-align: center; color: #fff; text-transform: uppercase; margin: 0; }
        .kanji-sub { text-align: center; font-size: 2rem; color: var(--jujutsu-red); margin-bottom: 20px; }
        
        .upload-area { border: 2px dashed var(--glass-border); padding: 40px; text-align: center; cursor: pointer; border-radius: 16px; margin-bottom: 20px; transition: 0.3s; }
        .upload-area:hover { background: rgba(255,51,51,0.05); }
        #file-input { display: none; }

        button { background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%); color: #000; padding: 15px 40px; font-weight: 800; border-radius: 12px; border: none; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #444; color: #888; }

        textarea { width: 100%; height: 160px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid var(--glass-border); padding: 15px; margin-top: 20px; border-radius: 12px; box-sizing: border-box; }
        .status-msg { text-align: center; color: #00f3ff; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <video class="video-bg" autoplay loop muted playsinline><source src="bg.mp4" type="video/mp4"></video>
    <div class="video-overlay"></div>

    <div class="container">
        <h1>JUJUTSU OCR</h1>
        <div class="kanji-sub">呪術廻戦</div>
        
        <div id="system-status" class="status-msg">Menyiapkan segel kutukan...</div>

        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <p>Klik atau tekan Ctrl + V untuk Paste Gambar</p>
        </div>
        <input type="file" id="file-input" accept="image/*">

        <div style="text-align: center;">
            <button id="process-btn" disabled>Inisialisasi...</button>
        </div>

        <textarea id="result-text" readonly placeholder="Hasil teks muncul di sini..."></textarea>
    </div>

    <script>
        let ocrWorker = null;
        let selectedImage = null;

        async function initOCR() {
            const status = document.getElementById('system-status');
            try {
                // Konfigurasi Worker dengan 3 bahasa sekaligus
                ocrWorker = await Tesseract.createWorker();
                await ocrWorker.loadLanguage('jpn+ind+eng');
                await ocrWorker.initialize('jpn+ind+eng');
                
                status.innerText = "Teknik Kutukan Siap! (Jepang/Indonesia/Inggris)";
                document.getElementById('process-btn').disabled = false;
                document.getElementById('process-btn').innerText = "Ekstrak Teks";
            } catch (err) {
                status.innerText = "Gagal memuat model. Periksa internet.";
            }
        }

        async function processImage(imageSource) {
            const btn = document.getElementById('process-btn');
            const result = document.getElementById('result-text');
            btn.disabled = true;
            result.value = "Membaca energi kutukan...";

            try {
                const { data: { text } } = await ocrWorker.recognize(imageSource);
                result.value = text.trim();
            } catch (err) {
                result.value = "Gagal memproses gambar.";
            }
            btn.disabled = false;
        }

        // File Handler
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => { selectedImage = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        window.addEventListener('paste', (e) => {
            const item = e.clipboardData.items[0];
            if (item && item.type.startsWith('image')) {
                const reader = new FileReader();
                reader.onload = (event) => { selectedImage = event.target.result; };
                reader.readAsDataURL(item.getAsFile());
            }
        });

        document.getElementById('process-btn').onclick = () => {
            if (selectedImage) processImage(selectedImage);
        };

        window.onload = initOCR;
    </script>
</body>
</html>
