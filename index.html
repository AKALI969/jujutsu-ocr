<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen OCR - Pemindai Kutukan Teks</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --jujutsu-red: #ff3333;
            --jujutsu-blue: #00f3ff;
            /* Diubah dari 0.60/0.75 menjadi 0.88 agar tampil jauh lebih gelap dan solid */
            --glass-bg: rgba(10, 15, 30, 0.88); 
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #f3f4f6;
            overflow-x: hidden;
            position: relative;
            background-color: #02040a;
        }

        /* Desain Background Video Modern & Ringan */
/* Perbaikan Sistem Video Background - Dipastikan 100% Jernih */
/* Perbaikan Sistem Video Background - Ukuran Pas & Tidak Ngezoom */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            
            /* Mengubah 'cover' menjadi 'fill' atau 'contain' agar tidak dipaksa ngezoom */
            object-fit: cover; 
            background-size: 100% 100%;
            
            /* Menghilangkan transform yang bikin video bergeser dan membesar */
            transform: none; 
            
            pointer-events: none;
            filter: none !important; 
            -webkit-filter: none !important;
        }

        /* Efek Filter Gelap - Diperjelas Tanpa Efek Samping Buram */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, rgba(2, 4, 10, 0.25) 0%, rgba(2, 4, 10, 0.5) 100%);
            pointer-events: none;
            
            /* MEMASTIKAN LAPISAN OVERLAY TIDAK IKUT BURAM */
            filter: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        /* Pendaran Energi Terkutuk */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.12) 0%, transparent 70%);
            top: -10%;
            right: -10%;
            z-index: -1;
            pointer-events: none;
            animation: pulseGlow 8s infinite alternate;
        }

        .bg-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.08) 0%, transparent 70%);
            bottom: -15%;
            left: -10%;
            z-index: -1;
            pointer-events: none;
            animation: pulseGlow 12s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-20px, 20px) scale(1.1); }
        }

        /* Kotak Utama Glassmorphism */
/* Kotak Utama Tanpa Efek Blur (Jernih & Transparan) */
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--glass-bg);
            
            /* SENSOR / HAPUS BAGIAN INI: */
            /* backdrop-filter: blur(20px) saturate(140%); */
            /* -webkit-backdrop-filter: blur(20px) saturate(140%); */
            
            /* GANTI MENJADI KODE DI BAWAH INI (Hanya menyisakan transparansi tanpa blur): */
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        0 0 80px rgba(0, 243, 255, 0.02);
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.8rem;
            color: #ffffff;
            text-align: center;
            margin: 0;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 50%, var(--jujutsu-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(0,243,255,0.2));
        }

        p.subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 8px;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .system-status {
            text-align: center;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
        }

        .status-ready { color: #00ffaa; text-shadow: 0 0 10px rgba(0,255,170,0.4); }
        .status-loading { color: #ffaa00; }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: var(--jujutsu-blue);
            background: rgba(0, 243, 255, 0.03);
            transform: scale(1.01);
        }

        .upload-area p {
            margin: 0;
            font-size: 1rem;
            color: #9ca3af;
        }

        .upload-area b { color: #fff; }
        #file-input { display: none; }

        #preview-container {
            margin-top: 30px;
            display: none;
            text-align: center;
        }

        #image-preview {
            max-width: 100%;
            max-height: 280px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            background: #ffffff;
            color: #060814;
            border: none;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: var(--jujutsu-blue);
            color: #000;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
        }

        button:disabled {
            background: rgba(255,255,255,0.1);
            color: #6b7280;
            cursor: not-allowed;
        }

        .status-container {
            margin-top: 25px;
            display: none;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--jujutsu-blue), var(--jujutsu-red));
            box-shadow: 0 0 15px var(--jujutsu-blue);
            transition: width 0.3s ease;
        }

        .result-container {
            margin-top: 35px;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 6px 16px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .copy-btn:hover {
            background: #fff;
            color: #000;
        }

        textarea {
            width: 100%;
            height: 160px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 18px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(0, 243, 255, 0.3);
        }
    </style>
</head>
<body>

    <video class="video-bg" autoplay loop muted playsinline>
        <source src="bg.mp4" type="video/mp4">
    </video>
    
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <h1>JUJUTSU OCR</h1>
        <p class="subtitle">Ekstraksi Teks Energi Terkutuk</p>

        <div class="system-status" id="system-status">
            <span class="status-loading" id="status-dot">●</span> 
            <span id="system-status-text">Menyiapkan segel kutukan di latar belakang...</span>
        </div>

        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>📁 Klik di sini atau langsung tekan <b>Ctrl + V</b> untuk Paste Gambar</p>
        </div>
        <input type="file" id="file-input" accept="image/*">

        <div id="preview-container">
            <img id="image-preview" src="#" alt="Pratinjau">
        </div>

        <div class="btn-container">
            <button id="process-btn" style="display: none;" onclick="processImage()" disabled>Menginisialisasi...</button>
        </div>

        <div class="status-container" id="status-container">
            <span id="status-text" style="font-size: 0.9rem; color: #9ca3af;">Menguraikan tulisan...</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="result-container" id="result-container">
            <div class="result-header">
                <h3 style="color: var(--jujutsu-blue); margin:0; font-size: 0.95rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Hasil Kalimat:</h3>
                <button class="copy-btn" onclick="copyText()">Salin Teks</button>
            </div>
            <textarea id="result-text" readonly></textarea>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const processBtn = document.getElementById('process-btn');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const systemStatusText = document.getElementById('system-status-text');
        const statusDot = document.getElementById('status-dot');

        let imageUrl = null;
        let ocrWorker = null;
        let isWorkerReady = false;

        async function initOCR() {
            try {
                if (typeof Tesseract === 'undefined') {
                    systemStatusText.innerText = "Gagal memuat skrip. Coba periksa jaringan internet Anda.";
                    return;
                }
                
                ocrWorker = await Tesseract.createWorker();
                await ocrWorker.loadLanguage('ind+eng');
                await ocrWorker.initialize('ind+eng');
                
                isWorkerReady = true;
                statusDot.className = "status-ready";
                systemStatusText.innerText = "Teknik Kutukan Siap! Sistem siap digunakan secara instan.";
                
                if (imageUrl) {
                    processBtn.removeAttribute('disabled');
                    processBtn.innerText = "Ekstrak Teks";
                }
            } catch (err) {
                console.error(err);
                systemStatusText.innerText = "Gagal mematangkan energi kutukan. Coba muat ulang halaman.";
            }
        }

        window.onload = initOCR;

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                if(imageUrl) URL.revokeObjectURL(imageUrl);
                imageUrl = URL.createObjectURL(file);
                
                imagePreview.src = imageUrl;
                previewContainer.style.display = 'block';
                processBtn.style.display = 'inline-block';
                resultContainer.style.display = 'none';
                statusContainer.style.display = 'none';

                if (isWorkerReady) {
                    processBtn.removeAttribute('disabled');
                    processBtn.innerText = "Ekstrak Teks";
                } else {
                    processBtn.setAttribute('disabled', 'true');
                    processBtn.innerText = "Menyiapkan Sistem...";
                }
            }
        }

        fileInput.addEventListener('change', function(e) {
            handleFile(e.target.files[0]);
        });

        window.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const file = items[i].getAsFile();
                    handleFile(file);
                    break;
                }
            }
        });

        async function processImage() {
            if (!imageUrl || !isWorkerReady) return;

            statusContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            processBtn.disabled = true;

            try {
                ocrWorker.logger = (m) => {
                    if (m.status === 'recognizing text') {
                        const progress = Math.round(m.progress * 100);
                        statusText.innerText = `Menguraikan Struktur Dimensi... (${progress}%)`;
                        progressFill.style.width = `${progress}%`;
                    }
                };

                const { data: { text } } = await ocrWorker.recognize(imageUrl);
                
                statusContainer.style.display = 'none';
                processBtn.disabled = false;
                resultText.value = text.trim() || "(Tidak ada tulisan terdeteksi di dalam gambar)";
                resultContainer.style.display = 'block';

            } catch (error) {
                console.error(error);
                statusContainer.style.display = 'none';
                processBtn.disabled = false;
                alert("Gagal membaca struktur teks pada gambar.");
            }
        }

        function copyText() {
            resultText.select();
            navigator.clipboard.writeText(resultText.value);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = 'Salin Teks', 2000);
        }
    </script>
</body>
</html>
