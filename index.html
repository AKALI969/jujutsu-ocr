<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen OCR - Pemindai Kutukan Teks</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --jujutsu-red: #8b0000;
            --jujutsu-blue: #00cfd5;
            --text-main: #c5c6c7;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, rgba(139, 0, 0, 0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(0, 207, 213, 0.1) 0%, transparent 50%);
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--panel-bg);
            border: 3px solid #111;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 0px #000, 0 0 20px rgba(0, 207, 213, 0.2);
            position: relative;
            box-sizing: border-box;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--jujutsu-red), var(--jujutsu-blue));
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.5rem;
            color: var(--text-light);
            text-align: center;
            margin-top: 0;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px var(--jujutsu-red);
        }

        p.subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--jujutsu-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Status Sistem di Bagian Atas */
        .system-status {
            text-align: center;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
            display: inline-block;
            align-self: center;
        }

        .status-ready { color: #00ff88; }
        .status-loading { color: #ffaa00; }

        .upload-area {
            border: 2px dashed rgba(0, 207, 213, 0.3);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: var(--jujutsu-blue);
            background: rgba(0, 207, 213, 0.05);
        }

        #file-input {
            display: none;
        }

        #preview-container {
            margin-top: 25px;
            display: none;
            text-align: center;
        }

        #image-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 6px;
            border: 2px solid var(--jujutsu-red);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }

        button {
            background: linear-gradient(135deg, #111, var(--jujutsu-red));
            color: white;
            border: 2px solid #000;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #000;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status-container {
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #111;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--jujutsu-blue), #ffffff);
            box-shadow: 0 0 10px var(--jujutsu-blue);
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .copy-btn {
            background: #111;
            border: 1px solid var(--jujutsu-blue);
            color: var(--jujutsu-blue);
            padding: 4px 12px;
            font-size: 0.8rem;
            box-shadow: none;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: rgba(0, 0, 0, 0.4);
            border: 2px solid #333;
            border-radius: 6px;
            padding: 15px;
            color: var(--text-light);
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container" style="display: flex; flex-direction: column;">
        <h1>JUJUTSU OCR</h1>
        <p class="subtitle">Ekstraksi Teks Energi Terkutuk</p>

        <div class="system-status" id="system-status">
            <span class="status-loading" id="status-dot">●</span> 
            <span id="system-status-text">Menyiapkan segel kutukan di latar belakang...</span>
        </div>

        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>📁 Klik di sini atau langsung tekan <b>Ctrl + V</b> untuk Paste Gambar</p>
        </div>
        <input type="file" id="file-input" accept="image/*">

        <div id="preview-container">
            <img id="image-preview" src="#" alt="Pratinjau">
        </div>

        <div class="btn-container">
            <button id="process-btn" style="display: none;" onclick="processImage()" disabled>Menginisialisasi...</button>
        </div>

        <div class="status-container" id="status-container">
            <span id="status-text">Menguraikan tulisan...</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="result-container" id="result-container">
            <div class="result-header">
                <h3 style="color: var(--jujutsu-blue); margin:0;">Hasil Kalimat:</h3>
                <button class="copy-btn" onclick="copyText()">Salin Teks</button>
            </div>
            <textarea id="result-text" readonly></textarea>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const processBtn = document.getElementById('process-btn');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const systemStatusText = document.getElementById('system-status-text');
        const statusDot = document.getElementById('status-dot');

        let imageUrl = null;
        let ocrWorker = null;
        let isWorkerReady = false;

        // --- 1. INISIALISASI DI LATAR BELAKANG (WARM-UP) ---
        async function initOCR() {
            try {
                if (typeof Tesseract === 'undefined') {
                    systemStatusText.innerText = "Koneksi internet lambat. Gagal memuat script.";
                    return;
                }
                
                // Membuat worker presisten sejak halaman dibuka
                ocrWorker = await Tesseract.createWorker();
                await ocrWorker.loadLanguage('ind+eng');
                await ocrWorker.initialize('ind+eng');
                
                isWorkerReady = true;
                statusDot.className = "status-ready";
                systemStatusText.innerText = "Teknik Kutukan Siap! Sistem siap memindai instan.";
                
                // Jika user sudah memasukkan gambar sebelum inisialisasi selesai, aktifkan tombolnya
                if (imageUrl) {
                    processBtn.removeAttribute('disabled');
                    processBtn.innerText = "Ekstrak Teks";
                }
            } catch (err) {
                console.error(err);
                systemStatusText.innerText = "Gagal mematangkan energi kutukan. Coba reload halaman.";
            }
        }

        // Jalankan inisialisasi langsung saat halaman dimuat
        window.onload = initOCR;

        // --- 2. PENANGANAN INPUT GAMBAR ---
        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                if(imageUrl) URL.revokeObjectURL(imageUrl); // Hapus cache memori lama
                imageUrl = URL.createObjectURL(file);
                
                imagePreview.src = imageUrl;
                previewContainer.style.display = 'block';
                processBtn.style.display = 'inline-block';
                resultContainer.style.display = 'none';
                statusContainer.style.display = 'none';

                if (isWorkerReady) {
                    processBtn.removeAttribute('disabled');
                    processBtn.innerText = "Ekstrak Teks";
                } else {
                    processBtn.setAttribute('disabled', 'true');
                    processBtn.innerText = "Menyiapkan Sistem...";
                }
            }
        }

        fileInput.addEventListener('change', function(e) {
            handleFile(e.target.files[0]);
        });

        window.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const file = items[i].getAsFile();
                    handleFile(file);
                    break;
                }
            }
        });

        // --- 3. PROSES MEMINDAI (JAUH LEBIH CEPAT) ---
        async function processImage() {
            if (!imageUrl || !isWorkerReady) return;

            statusContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            processBtn.disabled = true;
            statusText.innerText = "Membuka Ekspansi Domain... (0%)";
            progressFill.style.width = "0%";

            try {
                // Set logger dinamis untuk memantau progress
                ocrWorker.logger = (m) => {
                    if (m.status === 'recognizing text') {
                        const progress = Math.round(m.progress * 100);
                        statusText.innerText = `Ekstraksi Energi Terkutuk... (${progress}%)`;
                        progressFill.style.width = `${progress}%`;
                    }
                };

                const { data: { text } } = await ocrWorker.recognize(imageUrl);
                
                statusContainer.style.display = 'none';
                processBtn.disabled = false;
                resultText.value = text.trim() || "(Tidak ada tulisan terdeteksi)";
                resultContainer.style.display = 'block';

            } catch (error) {
                console.error(error);
                statusContainer.style.display = 'none';
                processBtn.disabled = false;
                alert("Gagal membaca gambar.");
            }
        }

        function copyText() {
            resultText.select();
            navigator.clipboard.writeText(resultText.value);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = 'Salin Teks', 2000);
        }
    </script>
</body>
</html>
