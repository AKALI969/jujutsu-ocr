<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen OCR - Pemindai Kutukan Teks</title>
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="logo.ico" type="image/x-icon">
    <link rel="icon" href="logo.ico" type="image/x-icon">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <style>
        :root {
            --jujutsu-red: #ff3333;
            --jujutsu-blue: #00f3ff;
            --glass-bg: rgba(7, 10, 20, 0.9); 
            --glass-border: rgba(255, 51, 51, 0.25); 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #f3f4f6;
            overflow-x: hidden;
            position: relative;
            background-color: #02040a;
        }

        .video-bg {
            position: fixed; top: 50%; left: 50%; width: 100%; height: 100%; z-index: -1;
            transform: translate(-50%, -50%); object-fit: cover; pointer-events: none;
            filter: grayscale(20%) contrast(110%);
        }

        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(180deg, rgba(2, 4, 10, 0.4) 0%, rgba(2, 4, 10, 0.7) 100%);
        }

        .audio-control {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(10, 15, 30, 0.8); border: 1px solid var(--jujutsu-red);
            color: var(--jujutsu-red); padding: 10px 15px; border-radius: 30px;
            cursor: pointer; font-size: 0.85rem; font-weight: 700;
        }

        .container {
            max-width: 650px; width: 100%; background: var(--glass-bg);
            border: 2px solid var(--glass-border); border-radius: 24px; padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95);
        }

        h1 {
            font-family: 'Impact', sans-serif; font-size: 3.5rem; color: #fff;
            text-align: center; margin: 0; text-transform: uppercase;
            background: linear-gradient(135deg, #fff, var(--jujutsu-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .kanji-sub { text-align: center; font-size: 2.2rem; color: var(--jujutsu-red); margin: 5px 0 15px 0; font-family: serif; }

        .upload-area {
            border: 2px dashed rgba(255, 51, 51, 0.25); background: rgba(0, 0, 0, 0.5);
            border-radius: 16px; padding: 50px 20px; text-align: center; cursor: pointer;
        }

        #image-preview { max-width: 100%; max-height: 280px; border-radius: 14px; margin-top: 20px; }

        button {
            background: linear-gradient(135deg, #fff, #e2e8f0); color: #000;
            border: none; padding: 15px 45px; font-weight: 800; border-radius: 12px;
            cursor: pointer; text-transform: uppercase; margin-top: 20px;
        }

        .progress-bar { width: 100%; height: 8px; background: #000; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--jujutsu-red); transition: width 0.3s; }

        textarea { width: 100%; height: 160px; background: rgba(0,0,0,0.6); border: 1px solid var(--jujutsu-red); color: #fff; padding: 15px; margin-top: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <button class="audio-control" id="audio-toggle" onclick="toggleAudio()">🎵 AUDIO: OFF</button>
    <audio id="bg-music" loop><source src="bg.mp3" type="audio/mp3"></audio>
    <video class="video-bg" autoplay loop muted playsinline><source src="bg.mp4" type="video/mp4"></video>
    <div class="video-overlay"></div>

    <div class="container">
        <h1>JUJUTSU OCR</h1>
        <div class="kanji-sub">呪術廻戦</div>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <p>Klik di sini atau Paste gambar (Ctrl+V)</p>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
        <img id="image-preview" src="#" alt="Pratinjau" style="display:none;">
        
        <div class="btn-container"><button id="process-btn" style="display:none;">Ekstrak Teks</button></div>
        
        <div id="status-container" style="display:none;">
            <p id="status-text">Mengurai...</p>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <div id="result-container" style="display:none;">
            <h3>Hasil:</h3>
            <textarea id="result-text" readonly></textarea>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const processBtn = document.getElementById('process-btn');
        const imagePreview = document.getElementById('image-preview');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        let worker;

        async function init() {
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('ind+eng');
            await worker.initialize('ind+eng');
        }
        init();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            imagePreview.src = url;
            imagePreview.style.display = 'block';
            processBtn.style.display = 'inline-block';
        };

        processBtn.onclick = async () => {
            document.getElementById('status-container').style.display = 'block';
            const { data: { text } } = await worker.recognize(imagePreview.src);
            resultText.value = text;
            resultContainer.style.display = 'block';
            document.getElementById('status-container').style.display = 'none';
        };

        function toggleAudio() {
            const audio = document.getElementById('bg-music');
            audio.paused ? audio.play() : audio.pause();
        }
    </script>
</body>
</html>
