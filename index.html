<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen OCR - Pemindai Kutukan Teks</title>
    
    <link rel="shortcut icon" href="logo.png" type="image/png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <style>
        :root {
            --jujutsu-red: #ff3333;
            --jujutsu-blue: #00f3ff;
            --glass-bg: rgba(7, 10, 20, 0.9); 
            --glass-border: rgba(255, 51, 51, 0.25); 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #f3f4f6;
            overflow-x: hidden;
            position: relative;
            background-color: #02040a;
        }

        /* Latar Belakang Video */
        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: fill; 
            pointer-events: none;
            filter: grayscale(20%) contrast(110%); 
            -webkit-filter: grayscale(20%) contrast(110%);
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, rgba(2, 4, 10, 0.4) 0%, rgba(2, 4, 10, 0.7) 100%);
            pointer-events: none;
        }

        /* Tombol Kontrol Audio Musik */
        .audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid var(--jujutsu-red);
            color: var(--jujutsu-red);
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.3);
            transition: all 0.3s ease;
        }

        .audio-control:hover {
            background: var(--jujutsu-red);
            color: #000;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.7);
            transform: scale(1.05);
        }

        /* Pendaran Energi Terkutuk Dinamis */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.12) 0%, transparent 70%);
            top: -10%;
            right: -10%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.08) 0%, transparent 70%);
            bottom: -15%;
            left: -10%;
            z-index: -1;
            pointer-events: none;
        }

        /* Kotak Utama */
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95), 
                        0 0 40px rgba(255, 51, 51, 0.15); 
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 3.5rem;
            color: #ffffff;
            text-align: center;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, var(--jujutsu-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: cursedPulseBlue 4s infinite alternate, ghostGlitch 6s infinite;
        }

        .kanji-sub {
            display: block;
            text-align: center;
            width: 100%;
            font-size: 2.2rem; 
            font-weight: 900;
            letter-spacing: 16px; 
            text-indent: 16px; 
            color: var(--jujutsu-red);
            margin-top: 5px;
            margin-bottom: 15px;
            font-family: 'Georgia', 'Times New Roman', serif;
            animation: cursedPulseRed 3s infinite alternate;
        }

        @keyframes cursedPulseBlue {
            0% { filter: drop-shadow(0 0 5px rgba(0,243,255,0.2)); opacity: 0.85; }
            50% { filter: drop-shadow(0 0 25px rgba(0,243,255,0.7)); opacity: 1; }
            100% { filter: drop-shadow(0 0 10px rgba(0,243,255,0.3)); opacity: 0.9; }
        }

        @keyframes cursedPulseRed {
            0% { text-shadow: 0 0 4px rgba(255, 51, 51, 0.3); opacity: 0.7; }
            50% { text-shadow: 0 0 25px rgba(255, 51, 51, 0.9); opacity: 1; }
            100% { text-shadow: 0 0 8px rgba(255, 51, 51, 0.4); opacity: 0.8; }
        }

        @keyframes ghostGlitch {
            0%, 92%, 100% { transform: skew(0deg); filter: hue-rotate(0deg); }
            93% { transform: skew(3deg); filter: hue-rotate(90deg); }
            96% { transform: skew(-4deg); filter: hue-rotate(-90deg); }
        }

        p.subtitle { text-align: center; font-size: 0.8rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 5px; margin-top: 8px; margin-bottom: 35px; font-weight: 600; text-shadow: 0 0 8px rgba(0,0,0,0.5); }

        .system-status { text-align: center; font-size: 0.8rem; background: rgba(255, 51, 51, 0.03); padding: 12px 16px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(255, 51, 51, 0.15); display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; }

        .status-ready { color: #00ffaa; text-shadow: 0 0 10px rgba(0,255,170,0.6); }
        .status-loading { color: #ff3333; text-shadow: 0 0 8px rgba(255,51,51,0.5); }

        .upload-area { border: 2px dashed rgba(255, 51, 51, 0.25); background: rgba(0, 0, 0, 0.5); border-radius: 16px; padding: 50px 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .upload-area:hover { border-color: var(--jujutsu-blue); background: rgba(0, 243, 255, 0.03); transform: scale(1.02); }
        #file-input { display: none; }

        #preview-container { margin-top: 30px; display: none; text-align: center; }
        #image-preview { max-width: 100%; max-height: 280px; border-radius: 14px; border: 2px solid rgba(255, 51, 51, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.9); }

        button { background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%); color: #060814; border: none; padding: 15px 45px; font-size: 1rem; font-weight: 800; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        button:hover:not(:disabled) { background: linear-gradient(135deg, var(--jujutsu-red) 0%, #b30000 100%); color: #fff; box-shadow: 0 0 30px rgba(255, 51, 51, 0.6); transform: translateY(-3px); }
        button:disabled { background: rgba(255,255,255,0.05); color: #4b5563; cursor: not-allowed; }

        .progress-bar { width: 100%; height: 8px; background-color: rgba(0,0,0,0.7); border-radius: 10px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--jujutsu-red), var(--jujutsu-blue)); box-shadow: 0 0 20px var(--jujutsu-red); transition: width 0.3s ease; }

        .result-container { margin-top: 35px; display: none; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .copy-btn { background: rgba(255, 51, 51, 0.1); border: 1px solid rgba(255, 51, 51, 0.3); color: var(--jujutsu-red); padding: 8px 18px; font-size: 0.8rem; font-weight: 600; border-radius: 8px; }
        
        textarea { width: 100%; height: 160px; background-color: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 51, 51, 0.15); border-radius: 12px; padding: 18px; color: #fff; font-size: 0.95rem; line-height: 1.6; resize: vertical; box-sizing: border-box; }
    </style>
</head>
<body>
    </body>
</html>
