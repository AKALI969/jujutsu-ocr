<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen OCR - Pemindai Kutukan Teks</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --jujutsu-red: #ff3333;
            --jujutsu-blue: #00f3ff;
            --glass-bg: rgba(10, 15, 30, 0.88); 
            --glass-border: rgba(0, 243, 255, 0.2); 
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #f3f4f6;
            overflow-x: hidden;
            position: relative;
            background-color: #02040a;
        }

        /* Latar Belakang Video - Mengunci Proporsi Agar Tidak Otomatis Ngezoom */
        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: fill; 
            pointer-events: none;
            filter: none !important; 
            -webkit-filter: none !important;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, rgba(2, 4, 10, 0.25) 0%, rgba(2, 4, 10, 0.5) 100%);
            pointer-events: none;
            filter: none !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        /* Pendaran Energi Terkutuk Dinamis */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.18) 0%, transparent 70%);
            top: -10%;
            right: -10%;
            z-index: -1;
            pointer-events: none;
            animation: pulseGlow 6s infinite alternate;
        }

        .bg-glow-2 {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.12) 0%, transparent 70%);
            bottom: -15%;
            left: -10%;
            z-index: -1;
            pointer-events: none;
            animation: pulseGlow 9s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: translate(0, 0) scale(1); filter: hue-rotate(0deg); }
            100% { transform: translate(-40px, 40px) scale(1.2); filter: hue-rotate(45deg); }
        }

        /* Kotak Utama Transparan Tanpa Blur */
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(0, 243, 255, 0.15); 
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            animation: containerAura 4s ease-in-out infinite alternate;
        }

        @keyframes containerAura {
            0% { border-color: rgba(0, 243, 255, 0.2); box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0, 243, 255, 0.1); }
            100% { border-color: rgba(255, 51, 51, 0.3); box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(255, 51, 51, 0.2); }
        }

        /* Judul Gaya Kuas Jepang Khas Anime */
        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 3.2rem;
            color: #ffffff;
            text-align: center;
            margin: 0;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 40%, var(--jujutsu-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0,243,255,0.3));
        }

        /* Tulisan Kanji: Center, Besar, Melebar Sejajar Judul */
        .kanji-sub {
            display: block;
            text-align: center;
            width: 100%;
            font-size: 2.2rem; 
            font-weight: 900;
            letter-spacing: 14px; 
            text-indent: 14px; 
            color: var(--jujutsu-red);
            margin-top: 5px;
            margin-bottom: 15px;
            font-family: 'Permanent Marker', 'Plus Jakarta Sans', sans-serif;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.7);
            animation: kanjiPulse 3s ease-in-out infinite alternate;
        }

        @keyframes kanjiPulse {
            0% { opacity: 0.8; filter: brightness(1); }
            100% { opacity: 1; filter: brightness(1.3); }
        }

        p.subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 8px;
            margin-bottom: 35px;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        .system-status {
            text-align: center;
            font-size: 0.8rem;
            background: rgba(0, 243, 255, 0.05);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,243,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            box-shadow: inset 0 0 10px rgba(0,243,255,0.05);
        }

        .status-ready { color: #00ffaa; text-shadow: 0 0 10px rgba(0,255,170,0.6); }
        .status-loading { color: #ffaa00; }

        .upload-area {
            border: 2px dashed rgba(0, 243, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 50px 20
