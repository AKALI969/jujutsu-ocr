<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen OCR - Pemindai Kutukan Teks</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <style>
        :root {
            --jujutsu-red: #ff3333;
            --jujutsu-blue: #00f3ff;
            --glass-bg: rgba(7, 10, 20, 0.9); 
            --glass-border: rgba(255, 51, 51, 0.25); 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #f3f4f6;
            overflow-x: hidden;
            position: relative;
            background-color: #02040a;
        }

        /* --- FITUR TAMBAHAN: EFEK DOMAIN --- */
        .container {
            transition: all 0.5s ease;
        }

        .active-domain {
            filter: brightness(1.2) saturate(1.5);
            border-color: var(--jujutsu-blue) !important;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2) !important;
            cursor: crosshair;
        }
        /* ----------------------------------- */

        .video-bg { position: fixed; top: 50%; left: 50%; width: 100%; height: 100%; z-index: -1; transform: translate(-50%, -50%); object-fit: fill; pointer-events: none; filter: grayscale(20%) contrast(110%); }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(180deg, rgba(2, 4, 10, 0.4) 0%, rgba(2, 4, 10, 0.7) 100%); pointer-events: none; }
        .audio-control { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(10, 15, 30, 0.8); border: 1px solid var(--jujutsu-red); color: var(--jujutsu-red); padding: 10px 15px; border-radius: 30px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: all 0.3s ease; }
        .audio-control:hover { background: var(--jujutsu-red); color: #000; box-shadow: 0 0 25px rgba(255, 51, 51, 0.7); }
        .bg-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255, 51, 51, 0.12) 0%, transparent 70%); top: -10%; right: -10%; z-index: -1; pointer-events: none; }
        .bg-glow-2 { position: fixed; width: 700px; height: 700px; background: radial-gradient(circle, rgba(0, 243, 255, 0.08) 0%, transparent 70%); bottom: -15%; left: -10%; z-index: -1; pointer-events: none; }
        .container { max-width: 650px; width: 100%; background: var(--glass-bg); border: 2px solid var(--glass-border); border-radius: 24px; padding: 40px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95), 0 0 40px rgba(255, 51, 51, 0.15); box-sizing: border-box; position: relative; overflow: hidden; }
        h1 { font-family: 'Impact', sans-serif; font-size: 3.5rem; color: #ffffff; text-align: center; margin: 0; letter-spacing: 3px; text-transform: uppercase; background: linear-gradient(135deg, #fff 30%, var(--jujutsu-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: cursedPulseBlue 4s infinite alternate, ghostGlitch 6s infinite; }
        .kanji-sub { display: block; text-align: center; width: 100%; font-size: 2.2rem; font-weight: 900; letter-spacing: 16px; color: var(--jujutsu-red); margin-top: 5px; margin-bottom: 15px; font-family: 'Georgia', serif; animation: cursedPulseRed 3s infinite alternate; }
        @keyframes cursedPulseBlue { 0% { filter: drop-shadow(0 0 5px rgba(0,243,255,0.2)); } 50% { filter: drop-shadow(0 0 25px rgba(0,243,255,0.7)); } 100% { filter: drop-shadow(0 0 10px rgba(0,243,255,0.3)); } }
        @keyframes cursedPulseRed { 0% { text-shadow: 0 0 4px rgba(255, 51, 51, 0.3); } 50% { text-shadow: 0 0 25px rgba(255, 51, 51, 0.9); } 100% { text-shadow: 0 0 8px rgba(255, 51, 51, 0.4); } }
        @keyframes ghostGlitch { 0%, 92%, 100% { transform: skew(0deg); } 93% { transform: skew(3deg); } 96% { transform: skew(-4deg); } }
        p.subtitle { text-align: center; font-size: 0.8rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 5px; margin-top: 8px; margin-bottom: 35px; }
        .system-status { text-align: center; font-size: 0.8rem; background: rgba(255, 51, 51, 0.03); padding: 12px 16px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(255, 51, 51, 0.15); }
        .status-ready { color: #00ffaa; }
        .status-loading { color: #ff3333; }
        .upload-area { border: 2px dashed rgba(255, 51, 51, 0.25); background: rgba(0, 0, 0, 0.5); border-radius: 16px; padding: 50px 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .upload-area:hover { border-color: var(--jujutsu-blue); background: rgba(0, 243, 255, 0.03); transform: scale(1.02); }
        #file-input { display: none; }
        #preview-container { margin-top: 30px; display: none; text-align: center; }
        #image-preview { max-width: 100%; max-height: 280px; border-radius: 14px; border: 2px solid rgba(255, 51, 51, 0.2); }
        .btn-container { display: flex; justify-content: center; margin-top: 30px; }
        button { background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%); color: #060814; border: none; padding: 15px 45px; font-size: 1rem; font-weight: 800; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:hover:not(:disabled) { background: linear-gradient(135deg, var(--jujutsu-red) 0%, #b30000 100%); color: #fff; }
        .status-container { margin-top: 25px; display: none; text-align: center; }
        .progress-bar { width: 100%; height: 8px; background-color: rgba(0,0,0,0.7); border-radius: 10px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--jujutsu-red), var(--jujutsu-blue)); transition: width 0.3s ease; }
        .result-container { margin-top: 35px; display: none; }
        .copy-btn { background: rgba(255, 51, 51, 0.1); border: 1px solid rgba(255, 51, 51, 0.3); color: var(--jujutsu-red); padding: 8px 18px; border-radius: 8px; cursor: pointer; }
        textarea { width: 100%; height: 160px; background-color: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 51, 51, 0.15); border-radius: 12px; padding: 18px; color: #fff; resize: vertical; }
    </style>
</head>
<body>

    <button class="audio-control" id="audio-toggle" onclick="toggleAudio()">🎵 AUDIO: OFF</button>
    <audio id="bg-music" loop><source src="bg.mp3" type="audio/mp3"></audio>
    <video class="video-bg" autoplay loop muted playsinline preload="auto"><source src="bg.mp4" type="video/mp4"></video>
    <div class="video-overlay"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container" id="main-container">
        <h1>JUJUTSU OCR</h1>
        <div class="kanji-sub">呪術廻戦</div>
        <p class="subtitle">Ekstraksi Teks Energi Terkutuk</p>
        <div class="system-status" id="system-status">
            <span class="status-loading" id="status-dot">●</span> 
            <span id="system-status-text">Menyiapkan segel kutukan di latar belakang...</span>
        </div>
        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>📁 Klik di sini atau langsung tekan <b>Ctrl + V</b> untuk Paste Gambar</p>
        </div>
        <input type="file" id="file-input" accept="image/*">
        <div id="preview-container">
            <img id="image-preview" src="#" alt="Pratinjau">
        </div>
        <div class="btn-container">
            <button id="process-btn" style="display: none;" onclick="processImage()" disabled>Menginisialisasi...</button>
        </div>
        <div class="status-container" id="status-container">
            <span id="status-text" style="font-size: 0.9rem; color: #9ca3af;">Menguraikan tulisan...</span>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div class="result-container" id="result-container">
            <div class="result-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 style="color: var(--jujutsu-red); margin:0; font-size: 0.95rem;">Hasil Kalimat:</h3>
                <button class="copy-btn" onclick="copyText()">Salin Teks</button>
            </div>
            <textarea id="result-text" readonly></textarea>
        </div>
    </div>

    <script>
        const container = document.getElementById('main-container');
        container.addEventListener('mouseenter', () => container.classList.add('active-domain'));
        container.addEventListener('mouseleave', () => container.classList.remove('active-domain'));

        // Sisa logika asli Anda...
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const processBtn = document.getElementById('process-btn');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const systemStatusText = document.getElementById('system-status-text');
        const statusDot = document.getElementById('status-dot');
        const bgMusic = document.getElementById('bg-music');
        const audioToggleBtn = document.getElementById('audio-toggle');

        let imageUrl = null;
        let ocrWorker = null;
        let isWorkerReady = false;

        function toggleAudio() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    audioToggleBtn.innerText = "🎵 AUDIO: ON";
                }).catch(err => console.log(err));
            } else {
                bgMusic.pause();
                audioToggleBtn.innerText = "🎵 AUDIO: OFF";
            }
        }

        async function initOCR() {
            try {
                ocrWorker = await Tesseract.createWorker();
                await ocrWorker.loadLanguage('ind+eng');
                await ocrWorker.initialize('ind+eng');
                isWorkerReady = true;
                statusDot.className = "status-ready";
                systemStatusText.innerText = "Teknik Kutukan Siap!";
                if (imageUrl) {
                    processBtn.removeAttribute('disabled');
                    processBtn.innerText = "Ekstrak Teks";
                }
            } catch (err) {
                systemStatusText.innerText = "Gagal memuat sistem.";
            }
        }

        window.onload = initOCR;

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                if(imageUrl) URL.revokeObjectURL(imageUrl);
                imageUrl = URL.createObjectURL(file);
                imagePreview.src = imageUrl;
                previewContainer.style.display = 'block';
                processBtn.style.display = 'inline-block';
                if (isWorkerReady) {
                    processBtn.removeAttribute('disabled');
                    processBtn.innerText = "Ekstrak Teks";
                }
            }
        }

        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        window.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) handleFile(items[i].getAsFile());
            }
        });

        async function processImage() {
            if (!imageUrl || !isWorkerReady) return;
            statusContainer.style.display = 'block';
            resultContainer.style.display = 'none';
            processBtn.disabled = true;
            try {
                const { data: { text } } = await ocrWorker.recognize(imagePreview);
                statusContainer.style.display = 'none';
                processBtn.disabled = false;
                resultText.value = text.replace(/\n+/g, ' ').trim();
                resultContainer.style.display = 'block';
            } catch (error) {
                alert("Gagal membaca teks.");
            }
        }

        function copyText() {
            resultText.select();
            document.execCommand('copy');
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = 'Salin Teks', 2000);
        }
    </script>
</body>
</html>
